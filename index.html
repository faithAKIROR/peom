<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Ai French Poem Generator</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="container">
    <header>
        <h1>Ai French Poem Generator</h1>
    </header>
    <main>
        <form id="poem-generator-form">
            <input type="text"
            placeholder="Enter a theme for your poem..."
            autofocus
            required
            autocomplete="off"
            class="instructions"
            id="user-instructions"
            />
            <input type="submit" class="submit-button"/>
        </form>
        <div class="poem" id="poem"> </div>
    </main>

    <footer>This Ai Project was coded by <a href="https://github.com/Faith-tech-code">Faith AKIROR</a>and is 
        <a href="https://github.com/Faith-tech-code/peom.git"target="_blank">open sourced on GitHub.</a> 
        and is hosted on <a href="https://poem-generator-faith.netlify.app/" target="_blank">Netlify</a>
    </footer>

  
    <script src="src/index.js"></script>
</body>
</html>
